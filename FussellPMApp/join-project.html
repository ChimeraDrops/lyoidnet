<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Project - Fussell PM</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Join Project</h1>
            <p class="tagline">Enter a project code to join</p>
        </header>

        <main>
            <div id="alert-container"></div>

            <div class="card" style="max-width: 500px; margin: 0 auto;">
                <div id="auth-loading" class="loading">
                    <div class="spinner"></div>
                    <p>Checking authentication...</p>
                </div>

                <div id="join-form" style="display:none;">
                    <p style="color: var(--text-secondary); margin-bottom: 20px;">
                        Logged in as <strong id="user-email-display"></strong>
                    </p>

                    <div class="form-group">
                        <label for="project-code">Project Code</label>
                        <input type="text" id="project-code" placeholder="e.g., ABC123" style="text-transform: uppercase; letter-spacing: 3px; font-size: 1.2rem; text-align: center;">
                    </div>

                    <button class="btn btn-primary" id="join-btn" style="width: 100%;">Join Project</button>

                    <div class="text-center mt-20">
                        <a href="dashboard.html" style="color: var(--text-secondary);">Back to Dashboard</a>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 Fussell PM. All rights reserved.</p>
        </footer>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

    <script type="module" src="join-project.js?v=1"></script>
</body>
</html>
