<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meat Crush - Match 3 Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <h1>🥩 MEAT CRUSH 🥓</h1>
        
        <div class="info-panel">
            <div class="score-container">
                <div class="label">Score</div>
                <div id="score" class="value">0</div>
            </div>
            <div class="moves-container">
                <div class="label">Moves</div>
                <div id="moves" class="value">30</div>
            </div>
            <div class="target-container">
                <div class="label">Target</div>
                <div id="target" class="value">1000</div>
            </div>
        </div>

        <div id="board" class="board"></div>

        <div class="controls">
            <button id="newGame" class="btn">New Game</button>
            <button id="hint" class="btn">Hint</button>
        </div>

        <div id="gameOver" class="modal hidden">
            <div class="modal-content">
                <h2 id="gameOverTitle">Game Over!</h2>
                <p id="gameOverMessage">Your score: <span id="finalScore">0</span></p>
                <button id="playAgain" class="btn">Play Again</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
