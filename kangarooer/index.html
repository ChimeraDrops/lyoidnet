<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kangarooer - Australian Outback Adventure</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>🦘 KANGAROOER 🦘</h1>
            <div class="game-info">
                <div class="info-item">
                    <span class="label">Score:</span>
                    <span id="score">0</span>
                </div>
                <div class="info-item">
                    <span class="label">Level:</span>
                    <span id="level">1</span>
                </div>
                <div class="info-item">
                    <span class="label">Lives:</span>
                    <span id="lives">❤️❤️❤️</span>
                </div>
            </div>
        </div>
        
        <canvas id="gameCanvas"></canvas>
        
        <div class="controls">
            <p><strong>Controls:</strong> Arrow Keys to Move | Space to Restart</p>
            <p class="warning">⚠️ Avoid koalas, snakes, and crocodiles! Watch for snakes changing lanes!</p>
        </div>
        
        <div id="gameOver" class="overlay hidden">
            <div class="overlay-content">
                <h2>GAME OVER!</h2>
                <p>Final Score: <span id="finalScore">0</span></p>
                <p>Press SPACE to restart</p>
            </div>
        </div>
        
        <div id="levelComplete" class="overlay hidden">
            <div class="overlay-content">
                <h2>LEVEL COMPLETE! 🎉</h2>
                <p>Score: <span id="levelScore">0</span></p>
                <p>Press SPACE to continue</p>
            </div>
        </div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
